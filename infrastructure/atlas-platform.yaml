AWSTemplateFormatVersion: '2010-09-09'
Description: 'Atlas PM-Agent Platform - ECS Fargate + EventBridge + Lambda'

Parameters:
  EcrImageUri:
    Type: String
    Description: 'ECR image URI (e.g., 123456789012.dkr.ecr.us-east-1.amazonaws.com/nova-atlas:latest)'
    Default: ''

  Environment:
    Type: String
    Description: 'Environment name'
    Default: 'prod'
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  # ========================================
  # ECS Cluster
  # ========================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'nova-atlas-cluster-${Environment}'
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: Nova-Atlas

  # ========================================
  # CloudWatch Log Groups
  # ========================================
  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/nova-atlas-listener-${Environment}'
      RetentionInDays: 7

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/nova-atlas-scheduled-${Environment}'
      RetentionInDays: 7

  # ========================================
  # IAM Roles
  # ========================================
  
  # ECS Task Execution Role (para pull de imagen y logs)
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'atlas-ecs-task-execution-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nova/atlas/*'

  # ECS Task Role (para runtime de la aplicación)
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'atlas-ecs-task-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AtlasRuntimePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nova/atlas/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt ECSLogGroup.Arn

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'atlas-lambda-scheduled-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AtlasLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nova/atlas/*'

  # EventBridge Scheduler Role
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'atlas-eventbridge-scheduler-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt ScheduledLambda.Arn

  # ========================================
  # ECS Task Definition - Slack Listener
  # ========================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'atlas-slack-listener-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'  # 0.25 vCPU
      Memory: '512'  # 512 MB
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: atlas-listener
          Image: !Ref EcrImageUri
          Essential: true
          Environment:
            - Name: MODE
              Value: slack_listener
            - Name: PYTHONUNBUFFERED
              Value: '1'
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - python3 -c "import sys; sys.exit(0)"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

  # ========================================
  # ECS Service - Slack Listener
  # ========================================
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub 'atlas-listener-${Environment}'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED  # Cambiar a DISABLED si usas NAT Gateway
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ========================================
  # VPC y Networking (minimal para demo)
  # ========================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub 'nova-atlas-vpc-${Environment}'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'nova-atlas-igw-${Environment}'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'nova-atlas-public-1-${Environment}'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'nova-atlas-public-2-${Environment}'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'nova-atlas-public-rt-${Environment}'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Atlas ECS tasks
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'nova-atlas-ecs-sg-${Environment}'

  # ========================================
  # Lambda Function - Scheduled Tasks
  # ========================================
  ScheduledLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'nova-atlas-scheduled-${Environment}'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300  # 5 min
      MemorySize: 512
      Environment:
        Variables:
          MODE: scheduled
          AWS_DEFAULT_REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              # Placeholder - será reemplazado con deployment package
              print(f"Received event: {json.dumps(event)}")
              company = event.get('company', 'unknown')
              task_type = event.get('task_type', 'unknown')
              print(f"Scheduled task: company={company} task={task_type}")
              return {
                  'statusCode': 200,
                  'body': json.dumps({'message': 'Scheduled task placeholder'})
              }
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ========================================
  # EventBridge Rules - Felirni schedules
  # ========================================
  
  # Monday Kickoff - Lunes 8am Bogotá (13:00 UTC)
  FelirniMondayKickoffRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'atlas-monday-kickoff-felirni-${Environment}'
      Description: 'Atlas Monday Kickoff for Felirni - Mondays 8am Bogota'
      ScheduleExpression: 'cron(0 13 ? * MON *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt ScheduledLambda.Arn
          Id: FelirniMondayKickoff
          Input: '{"company": "felirni", "task_type": "monday_kickoff"}'
          RoleArn: !GetAtt EventBridgeRole.Arn

  # Daily Stale Check - Diario 9am Bogotá (14:00 UTC)
  FelirniDailyStaleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'atlas-daily-stale-felirni-${Environment}'
      Description: 'Atlas Daily Stale Check for Felirni - Daily 9am Bogota'
      ScheduleExpression: 'cron(0 14 ? * * *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt ScheduledLambda.Arn
          Id: FelirniDailyStale
          Input: '{"company": "felirni", "task_type": "daily_stale"}'
          RoleArn: !GetAtt EventBridgeRole.Arn

  # Weekly Status - Viernes 5pm Bogotá (22:00 UTC)
  FelirniWeeklyStatusRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'atlas-weekly-status-felirni-${Environment}'
      Description: 'Atlas Weekly Status for Felirni - Fridays 5pm Bogota'
      ScheduleExpression: 'cron(0 22 ? * FRI *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt ScheduledLambda.Arn
          Id: FelirniWeeklyStatus
          Input: '{"company": "felirni", "task_type": "weekly_status"}'
          RoleArn: !GetAtt EventBridgeRole.Arn

  # Lambda permissions for EventBridge
  LambdaInvokePermissionMondayKickoff:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ScheduledLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FelirniMondayKickoffRule.Arn

  LambdaInvokePermissionDailyStale:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ScheduledLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FelirniDailyStaleRule.Arn

  LambdaInvokePermissionWeeklyStatus:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ScheduledLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FelirniWeeklyStatusRule.Arn

# ========================================
# Outputs
# ========================================
Outputs:
  ClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ClusterName'

  ServiceName:
    Description: ECS Service Name
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub '${AWS::StackName}-ServiceName'

  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt ScheduledLambda.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaArn'

  TaskRoleArn:
    Description: ECS Task Role ARN
    Value: !GetAtt ECSTaskRole.Arn

  LambdaRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn

  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  LogGroupECS:
    Description: CloudWatch Log Group for ECS
    Value: !Ref ECSLogGroup

  LogGroupLambda:
    Description: CloudWatch Log Group for Lambda
    Value: !Ref LambdaLogGroup
